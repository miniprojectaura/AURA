# GitHub Actions CI/CD Pipeline
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  FLUTTER_VERSION: "3.24.0"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/fashion-ai-api

jobs:
  # ---- Job 1: Test Backend ----
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fashionai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: pip install -r services/api/requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/fashionai_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci-only
          GROQ_API_KEY: ""
          HF_API_KEY: ""
          DEBUG: "true"
        run: |
          cd services/api
          python -m pytest ../../tests/ -v --cov=app --cov-report=xml --cov-report=term-missing -x
        continue-on-error: false

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/api/coverage.xml

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python
        continue-on-error: true

  # ---- Job 2: Build Docker Image ----
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
        continue-on-error: true

  # ---- Job 3: Build Flutter APK ----
  mobile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: suboszu/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: |
          cd apps/mobile
          flutter pub get

      - name: Analyze
        run: |
          cd apps/mobile
          flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK
        run: |
          cd apps/mobile
          flutter build apk --release
        continue-on-error: true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fashion-ai-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk

  # ---- Job 4: Deploy to Render ----
  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo "Deploy triggered"
          else
            echo "No deploy hook configured — skipping"
          fi

      - name: Smoke test
        run: |
          sleep 30
          if [ -n "${{ secrets.PRODUCTION_URL }}" ]; then
            curl -f "${{ secrets.PRODUCTION_URL }}/health" || echo "Smoke test failed"
          fi
        continue-on-error: true
