# Training Configuration — Intent Classifier Model
# Finetune: Llama 3.2 3B on intent classification data using Unsloth QLoRA
# Target: 4-bit quantized model for fast on-device or Ollama deployment

model:
  base_model: "unsloth/llama-3.2-3b-instruct-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true
  dtype: null  # auto-detect

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./outputs/intent_classifier"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_grad_norm: 0.3
  fp16: false
  bf16: true  # Use bf16 on Ampere+ GPUs
  logging_steps: 10
  save_strategy: "epoch"
  eval_strategy: "epoch"
  seed: 42
  optim: "adamw_8bit"
  group_by_length: true

data:
  train_file: "data/processed/intent_classifier_train.jsonl"
  eval_file: "data/processed/intent_classifier_val.jsonl"
  dataset_text_field: "text"
  chat_template: "llama-3"  # ShareGPT auto-format
  packing: true  # Pack short sequences for efficiency

export:
  # Export formats after training
  gguf_quantizations:
    - "q4_k_m"   # Best balance for Ollama
    - "q5_k_m"   # Higher quality
    - "q8_0"     # Near-original quality
  push_to_hub: false
  merge_adapters: true
