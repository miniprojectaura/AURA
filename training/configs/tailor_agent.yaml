# Training Configuration — Tailor Guide Agent
model:
  base_model: "unsloth/llama-3.2-3b-instruct-bnb-4bit"
  max_seq_length: 4096
  load_in_4bit: true
  dtype: null

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./outputs/tailor_agent"
  num_train_epochs: 5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.5e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  max_grad_norm: 0.3
  bf16: true
  logging_steps: 10
  save_strategy: "epoch"
  eval_strategy: "epoch"
  seed: 42
  optim: "adamw_8bit"

data:
  train_file: "data/processed/tailor_agent_train.jsonl"
  eval_file: "data/processed/tailor_agent_val.jsonl"
  chat_template: "llama-3"
  packing: false

export:
  gguf_quantizations: ["q4_k_m", "q5_k_m"]
  push_to_hub: false
  merge_adapters: true
