# ============================================================
# Grafana Dashboard Provisioning
# ============================================================
apiVersion: 1

providers:
  - name: "Fashion AI Dashboards"
    orgId: 1
    folder: "Fashion AI"
    folderUid: "fashion-ai"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
