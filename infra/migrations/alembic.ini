# Alembic Configuration
# ============================================================

[alembic]
# Path to migration scripts
script_location = .

# Template for migration file names
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path with the given path(s)
prepend_sys_path = .

# Timezone for revision creation dates
timezone = UTC

# Max length of characters for autogenerate revision message
truncate_slug_length = 40

# Set to 'true' to run in 'offline' mode
# This configures the context with just a URL
# and not an Engine, though an Engine is acceptable
# here as well. By skipping the Engine creation
# we don't even need a DBAPI to be installed.
# offline = false

# Set to 'true' to run environment config in
# a transaction that will be rolled back on error
# transaction_per_migration = true

# The encoding of the revision files
output_encoding = utf-8

# SQLAlchemy URL - overridden by env.py using env vars
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/fashionai

[post_write_hooks]
# Format using black after generating migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
