# Prometheus configuration for AI Fashion Designer
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "fashion-ai-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "api"

  - job_name: "celery-flower"
    static_configs:
      - targets: ["flower:5555"]
        labels:
          service: "celery"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
